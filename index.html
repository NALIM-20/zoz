<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dating App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <aside id="sidebar">
            <div class="sidebar-header">Objavuj</div>
            <div id="user-list"></div>
        </aside>

        <main id="chat-container">
            <div id="chat-header">Vyber si niekoho, s kým si chceš písať</div>
            <div id="messages"></div>
            <div id="input-area" class="hidden">
                <input type="text" id="user-input" placeholder="Napíš správu...">
                <button id="send-btn">Odoslať</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
